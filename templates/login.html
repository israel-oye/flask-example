{% extends 'base.html' %}

    {% block style %}      
    <style>
        .email-input{
            padding: 4px 6px;
        }

        body {
            padding: 48px;
        }
    
        form {
            margin-inline: auto;
            padding: 16px 24px;
            width: 40%;
            border-radius: 12px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-flow: column nowrap;
            gap: 16px;
        }
    </style>
    {% endblock %}

    {% block content %}

        <form action="" method="post">
        <h3>Login</h3>
        {{form.csrf_token}}

        {{form.email()}}
        <!--  -->
        {{form.password(class_="form-control")}}
        <input type="submit" value="Submit">
    </form>
    {% endblock %}
