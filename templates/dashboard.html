{% extends 'base.html' %}

{% block style %}
    <style>
        main{
            padding: 0 24px;
        }

        .posts{
            padding: 12px;
            margin-inline: auto;
            display: flex;
            gap: 24px;
            flex-direction: column;
            align-items: start;
        }

        .post{
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            padding: 24px;
            border: .5px solid #2f302e3f;
            transition: all 0.4s ease;
            cursor: pointer;
            display: flex;
            gap: 16px;
            justify-content: space-between;
        }

        .post:hover{
            box-shadow: 0 0 0;
            transform: translate(2px, 2px);
            
        }
    </style>
{% endblock %}

{% block content %}
<main>
    <h1>Dashboard</h1>
    <div class="container">
        <h3>Username: {{user.username}}</h3>
    </div>

    <div class="posts">
        {% for post in current_user.posts %}
            <div class="post">
                <h5>{{loop.index}}. {{post.title}}</h5>
                <a href="{{url_for('post_detail', id=post.id)}}" class="btn btn-success rounded">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-right-circle-fill"
                        viewBox="0 0 16 16">
                        <path
                            d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0M4.5 7.5a.5.5 0 0 0 0 1h5.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5z" />
                    </svg>
                </a>

                <a href="{{ url_for('edit_post', id=post.id) }}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-fill"
                        viewBox="0 0 16 16">
                        <path
                            d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z" />
                    </svg>
                </a>

                <form action="{{url_for('delete_post', id=post.id)}}" method="post">
                    <button type="submit">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash3-fill"
                            viewBox="0 0 16 16">
                            <path
                                d="M11 1.5v1h3.5a.5.5 0 0 1 0 1h-.538l-.853 10.66A2 2 0 0 1 11.115 16h-6.23a2 2 0 0 1-1.994-1.84L2.038 3.5H1.5a.5.5 0 0 1 0-1H5v-1A1.5 1.5 0 0 1 6.5 0h3A1.5 1.5 0 0 1 11 1.5m-5 0v1h4v-1a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5M4.5 5.029l.5 8.5a.5.5 0 1 0 .998-.06l-.5-8.5a.5.5 0 1 0-.998.06m6.53-.528a.5.5 0 0 0-.528.47l-.5 8.5a.5.5 0 0 0 .998.058l.5-8.5a.5.5 0 0 0-.47-.528M8 4.5a.5.5 0 0 0-.5.5v8.5a.5.5 0 0 0 1 0V5a.5.5 0 0 0-.5-.5" />
                        </svg>
                    </button>
                </form>

            </div>
        {% endfor %}
    </div>
</main>
    
{% endblock %}

{% block scripts %}
    <script text="text/javascript">
        const forms = document.querySelectorAll('form');

        forms.forEach((form)=>{
            form.addEventListener('submit', (e)=>{
                let confirmDelete = confirm("Are you sure you want to delete item?");

                if (!confirmDelete){
                    e.preventDefault();
                }
            })
        })
    </script>
{% endblock %}
