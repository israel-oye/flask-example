<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        p{
            padding: 8px;
            text-align: center;
            font-size: 18px;
        }

        main{
            padding: 12px 24px;
        }

        .header{
            height: 10vh;
            padding: 12px;
            background: linear-gradient(27deg, rgb(8, 132, 255), rgb(0, 64, 101));
            text-align: center;
            color: rgb(197, 212, 227);
        }

        .otp-container{
            border: 3px dotted rgb(0, 64, 101);
            border-radius: 12px;
            padding: 36px;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            font-style: italic;
            letter-spacing: 4px;
            color: rgb(0, 33, 53);
            display: block;
            width: 40%;
            text-align: center;
            margin: 16px auto;
            background-color: rgb(214, 220, 227);
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Your OTP</h2>
    </div>
    <main>
        <p>
            Welcome {{username}} to our platform. Your OTP code to verify your email is:
        </p>
        <span class="otp-container">
           {{otp}}
        </span>
    </main>
</body>
</html>
